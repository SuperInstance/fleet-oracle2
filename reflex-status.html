<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Reflex Status · Co-Captain</title>
<link rel="stylesheet" href="fleet-shell.css">
<style>
  /* ── Page-specific styles ── */

  /* Reflex card grid */
  .reflex-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 12px;
  }

  /* Reflex meta info inside shell-card-body */
  .reflex-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    margin-top: 10px;
    font-size: 12px;
  }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label {
    font-family: var(--font-body);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--salvage);
    opacity: 0.7;
  }
  .meta-value {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: #c9d1d9;
  }
  .meta-value.highlight { color: var(--brass); }

  .reflex-desc {
    margin-top: 8px;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--salvage);
    line-height: 1.4;
  }

  /* Gauge mini-inline for each reflex card */
  .reflex-gauge-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  /* Salvage Bay special spacing */
  .salvage-section {
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="carapace-nav" style="margin-bottom:20px;">
  <div class="carapace-segment" data-segment="rotation" onclick="location.href='rotation-dashboard.html'">
    <span class="segment-icon">🦀</span>
    <span class="segment-label">Rotation</span>
  </div>
  <div class="carapace-segment" data-segment="agents" onclick="location.href='fleet-dashboard.html'">
    <span class="segment-icon">⚙️</span>
    <span class="segment-label">Fleet</span>
  </div>
  <div class="carapace-segment active" data-segment="reflexes">
    <span class="segment-icon">📡</span>
    <span class="segment-label">Reflexes</span>
  </div>
  <div class="carapace-segment" data-segment="oracle">
    <span class="segment-icon">🔮</span>
    <span class="segment-label">Oracle</span>
  </div>
  <div class="carapace-segment" data-segment="salvage">
    <span class="segment-icon">🗄️</span>
    <span class="segment-label">Shells</span>

</div>

<h1 class="dashboard-title" style="margin-bottom:4px;"><span class="crab-icon">🦀</span>FLEET REFLEX STATUS · Co-Captain</h1>
<div class="subtitle" style="margin-bottom:24px;">Nebula reflex registry — real-time shell health overview</div>

<!-- ── Status summary bar ── -->
<div class="shell-status-bar">
  <div class="shell-status-item">
    <div class="shell-status-dot green"></div>
    <span class="shell-status-count" id="count-active">—</span>
    <span class="shell-status-label">Active</span>
  </div>
  <div class="shell-status-item">
    <div class="shell-status-dot yellow"></div>
    <span class="shell-status-count" id="count-idle">—</span>
    <span class="shell-status-label">Idle</span>
  </div>
  <div class="shell-status-item">
    <div class="shell-status-dot red"></div>
    <span class="shell-status-count" id="count-error">—</span>
    <span class="shell-status-label">Error</span>
  </div>
  <div class="shell-status-item">
    <div class="shell-status-dot purple"></div>
    <span class="shell-status-count" id="count-unknown">—</span>
    <span class="shell-status-label">Unknown</span>
  </div>
  <div style="margin-left:auto; color:var(--salvage); font-family:var(--font-mono); font-size:11px;">
    Last scan: <span id="last-scan">—</span>
  </div>
</div>

<!-- ── Filter tabs ── -->
<div class="shell-tabs">
  <div class="shell-tab active" data-filter="all">All <span class="count" id="tab-all">—</span></div>
  <div class="shell-tab" data-filter="active">Active <span class="count" id="tab-active">—</span></div>
  <div class="shell-tab" data-filter="idle">Idle <span class="count" id="tab-idle">—</span></div>
  <div class="shell-tab" data-filter="error">Error <span class="count" id="tab-error">—</span></div>
</div>

<!-- ── Reflex cards grid ── -->
<div class="reflex-grid" id="reflex-grid">
  <div style="grid-column:1/-1;text-align:center;color:var(--salvage);padding:40px;">
    <div class="cog-spinner" aria-label="Loading">
      <div class="cog-spinner-inner">
        <svg class="cog" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="16" fill="none" stroke="var(--brass)" stroke-width="2" opacity="0.6"/>
          <g class="cog-teeth" fill="none" stroke="var(--brass)" stroke-width="2.5">

            <rect x="27" y="54" width="10" height="8" rx="1"/>
            <rect x="2" y="27" width="8" height="10" rx="1"/>

            <rect x="9.5" y="46.5" width="10" height="8" rx="1" transform="rotate(45 14.5 50.5)"/>
            <rect x="44.5" y="46.5" width="10" height="8" rx="1" transform="rotate(45 49.5 50.5)"/>
          </g>
          <circle cx="32" cy="32" r="6" fill="none" stroke="var(--brass)" stroke-width="2" opacity="0.5"/>
          <circle cx="32" cy="32" r="2" fill="var(--brass)" opacity="0.7"/>
        </svg>
        <div class="claw-tick"></div>
      </div>
      <span class="cog-label">Loading reflex registry…</span>
    </div>
  </div>
</div>

// ── Render ─────────────────────────────────────────────────────────────────
let currentFilter = 'all';

function getMiniGaugeHTML(value) {
  const pct = Math.round(value * 100);
  const cls = value >= 0.7 ? 'green' : value >= 0.4 ? 'yellow' : 'red';
  return `<div class="mini-gauge ${cls}">
    <div class="mini-gauge-dot"></div>
    <span style="font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--bio-glow);">${pct}%</span>
  </div>`;
}

function timeAgo(ts) {
  if (!ts) return '—';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return Math.round(diff) + 's ago';
  if (diff < 3600) return Math.round(diff / 60) + 'm ago';
  if (diff < 86400) return Math.round(diff / 3600) + 'h ago';
  return Math.round(diff / 86400) + 'd ago';
}

function renderReflexes(filter) {
  const grid = document.getElementById('reflex-grid');
  const active = REFLEXES.filter(r => !r.salvage);
  const salvage = REFLEXES.filter(r => r.salvage);

  let activeFiltered = active;
  let salvageFiltered = salvage;
  if (filter !== 'all') {
    activeFiltered = active.filter(r => r.status === filter);
    salvageFiltered = salvage.filter(r => r.status === filter);
  }

  let html = '';

  // Active section
  if (activeFiltered.length === 0) {
    html += '<div style="grid-column:1/-1;text-align:center;color:var(--salvage);padding:40px;">No active reflexes match this filter.</div>';
  } else {
    activeFiltered.forEach(r => {
      html += buildReflexCard(r, false);
    });
  }

  // Salvage Bay section (only shown when filter is 'all' or 'dead')
  if (filter === 'all' || filter === 'dead' || filter === 'error') {
    const showSalvage = filter === 'all' ? salvage : salvageFiltered;
    if (showSalvage.length > 0) {
      html += `<div class="salvage-section" style="grid-column:1/-1;">`;
      html += `<div class="shell-section-divider"></div>`;
      html += `<h2 class="shell-rust-title">🗄️ Salvage Bay</h2>`;
      html += `<div class="reflex-grid">`;
      showSalvage.forEach(r => {
        html += buildReflexCard(r, true);
      });
      html += `</div></div>`;
    }
  }

  grid.innerHTML = html;
}

function buildReflexCard(r, isSalvage) {
  const cardExtra = isSalvage ? ' rust-card' : '';
  const healthPct = Math.round(r.health * 100);
  const healthCls = r.health >= 0.7 ? 'bio' : r.health >= 0.4 ? 'amber' : 'rust';
  const statusMap = {
    active: ['shell-badge-active', 'ACTIVE'],
    idle:   ['shell-badge-warn',   'IDLE'],
    error:  ['shell-badge-down',   'ERROR'],
    dead:   ['shell-badge-down',   'DEAD'],
    unknown:['shell-badge-down',   'UNKNOWN'],
  };
  const [badgeCls, badgeTxt] = statusMap[r.status] || statusMap.unknown;

  return `
    <div class="shell-card${cardExtra}">
      <div class="shell-card-header">
        <span class="shell-card-icon">${isSalvage ? '🗄️' : '⚡'}</span>
        <span class="shell-card-title">${r.name}</span>
        <span class="shell-badge ${badgeCls}">${badgeTxt}</span>
      </div>
      <div class="shell-card-body">
        <div class="reflex-gauge-row">
          ${getMiniGaugeHTML(r.health)}
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--salvage);">${r.id}</span>
        </div>
        <div class="reflex-desc">${r.description}</div>
        <div class="shell-progress-bar" style="margin-top:10px;">
          <div class="shell-progress-fill${isSalvage ? ' rust-glow' : ''}" style="width:${healthPct}%"></div>
        </div>
        <div class="reflex-meta">
          <div class="meta-item">
            <span class="meta-label">Health</span>
            <span class="meta-value highlight" style="color:var(--${healthCls});">${healthPct}%</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Latency</span>
            <span class="meta-value">${r.latency_ms}ms</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Hit Count</span>
            <span class="meta-value">${r.hit_count.toLocaleString()}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Last Trigger</span>
            <span class="meta-value">${timeAgo(r.last_trigger)}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Cooldown</span>
            <span class="meta-value">${r.cooldown_s}s</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Tags</span>
            <span class="meta-value" style="font-size:10px;color:var(--magenta);">${r.tags.join(', ')}</span>
          </div>
        </div>
      </div>
      <div class="shell-card-footer">
        <span class="shell-timestamp">${timeAgo(r.last_trigger)}</span>
        <span class="shell-ref">${r.id.toUpperCase()}</span>
      </div>
    </div>`;
}

function updateCounts() {
  const active = REFLEXES.filter(r => !r.salvage);
  const byStatus = (s) => active.filter(r => r.status === s).length;
  document.getElementById('count-active').textContent = byStatus('active');
  document.getElementById('count-idle').textContent   = byStatus('idle');
  document.getElementById('count-error').textContent  = byStatus('error');
  document.getElementById('count-unknown').textContent = byStatus('unknown');

  document.getElementById('tab-all').textContent    = active.length;
  document.getElementById('tab-active').textContent  = byStatus('active');
  document.getElementById('tab-idle').textContent    = byStatus('idle');
  document.getElementById('tab-error').textContent  = byStatus('error');

  document.getElementById('last-scan').textContent = new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
}

// ── Tab handling ────────────────────────────────────────────────────────────
document.querySelectorAll('.shell-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.shell-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderReflexes(currentFilter);
  });
});

// ── Init ───────────────────────────────────────────────────────────────────
updateCounts();
renderReflexes('all');
</script>
</body>
</html>
